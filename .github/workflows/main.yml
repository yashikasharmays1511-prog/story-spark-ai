name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Work around npm optional dependency bug (Rollup Linux binary)
        run: pnpm --filter story-spark-ai-frontend add @rollup/rollup-linux-x64-gnu
      - name: Work around npm optional dependency bug (Lightning CSS Linux binary)
        run: pnpm --filter story-spark-ai-frontend add lightningcss-linux-x64-gnu
      - name: Build
        run: pnpm run build
