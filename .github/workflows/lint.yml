name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: changes
        shell: bash
        run: |
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")"
          echo "$files"
          if echo "$files" | grep -q '^frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v2
        if: steps.changes.outputs.frontend == 'true'
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Rebuild native bindings for current platform
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm rebuild

      - run: pnpm lint
        if: steps.changes.outputs.frontend == 'true'

      - name: Skip frontend lint
        if: steps.changes.outputs.frontend != 'true'
        run: echo "No frontend files changed; skipping frontend lint."
